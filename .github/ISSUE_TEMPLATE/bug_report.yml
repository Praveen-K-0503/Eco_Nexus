name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the form below as completely as possible.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which environment did you encounter the bug in?
      options:
        - Production (econexus.com)
        - Staging
        - Local development
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS
      description: e.g. Chrome 120 on macOS 14, Firefox 121 on Ubuntu 22.04
      placeholder: Chrome 120 / macOS 14
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node.js version (if applicable)
      placeholder: "20.10.0"
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide clear, numbered steps to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Fill in '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and stack traces if available.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recordings
      description: If applicable, paste or drag-and-drop screenshots here.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information that might help us diagnose the issue.
    validations:
      required: false
